name = "kemail"
main = "worker.js"
compatibility_date = "2026-03-09"
workers_dev = true

# 首次部署前，请复制为本地 wrangler.toml，并替换下面的 Worker 名称、资源 ID 和后续自定义域名配置。
# 建议把 live wrangler.toml 保留在本机，并继续通过 .gitignore 排除。
# workers.dev 便于第一次验证；如果你后续绑定了正式域名，建议在本地 wrangler.toml 中改成 false。
[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "mail_db"
database_id = "YOUR_D1_DATABASE_ID"

# Cron Triggers 使用 UTC。建议把触发频率继续留在 Wrangler 配置里维护，
# 而把“保留天数 / 清理规则 / 是否启用”这类治理策略交给管理端和 D1。
[triggers]
# 每小时执行一次
crons = ["0 * * * *"]
